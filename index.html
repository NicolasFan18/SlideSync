<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SlideSync – YouTube to Slideshow</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c28; --border: #2a2a3a;
    --accent: #ff6b35; --accent2: #ffd166; --text: #f0eee8; --muted: #888899; --slide-bg: #111118;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events:none; z-index:0; opacity:.4; }

  header { position:relative; z-index:10; padding:28px 48px; display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--border); }
  .logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.4rem; letter-spacing:-.5px; }
  .logo span { color:var(--accent); }
  .logo-dot { width:8px; height:8px; background:var(--accent); border-radius:50%; animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.5;transform:scale(.7);} }



  #home { position:relative; z-index:5; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:calc(100vh - 80px); padding:60px 24px; text-align:center; }
  .eyebrow { font-size:.75rem; letter-spacing:3px; text-transform:uppercase; color:var(--accent); font-weight:600; margin-bottom:20px; opacity:0; animation:fadeUp .6s .1s ease forwards; }
  h1 { font-family:'Syne',sans-serif; font-size:clamp(2.4rem,6vw,5rem); font-weight:800; line-height:1.05; letter-spacing:-2px; max-width:780px; opacity:0; animation:fadeUp .6s .2s ease forwards; }
  h1 em { font-style:normal; color:var(--accent2); }
  .subtitle { margin-top:20px; font-size:1.1rem; color:var(--muted); max-width:480px; line-height:1.6; font-weight:300; opacity:0; animation:fadeUp .6s .3s ease forwards; }

  .input-wrap { margin-top:48px; width:100%; max-width:640px; opacity:0; animation:fadeUp .6s .4s ease forwards; }
  .input-row { display:flex; background:var(--surface); border:1.5px solid var(--border); border-radius:14px; overflow:hidden; transition:border-color .2s,box-shadow .2s; }
  .input-row:focus-within { border-color:var(--accent); box-shadow:0 0 0 4px rgba(255,107,53,.12); }
  .input-row input { flex:1; background:transparent; border:none; outline:none; padding:18px 20px; font-size:1rem; color:var(--text); font-family:'DM Sans',sans-serif; }
  .input-row input::placeholder { color:var(--muted); }
  .go-btn { background:var(--accent); border:none; padding:0 28px; cursor:pointer; font-family:'Syne',sans-serif; font-weight:700; font-size:.95rem; color:#fff; transition:background .2s,transform .1s; white-space:nowrap; display:flex; align-items:center; gap:8px; }
  .go-btn:hover { background:#ff8557; }
  .go-btn:active { transform:scale(.97); }
  .go-btn:disabled { background:#555; cursor:not-allowed; }
  .go-btn svg { width:18px; height:18px; }
  .hint { margin-top:12px; font-size:.8rem; color:var(--muted); text-align:left; padding-left:4px; }

  #status { margin-top:32px; font-size:.95rem; color:var(--muted); display:none; align-items:center; gap:10px; }
  #status.visible { display:flex; }
  .spinner { width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; flex-shrink:0; }
  @keyframes spin { to{transform:rotate(360deg);} }

  .error-msg { background:rgba(255,80,80,.1); border:1px solid rgba(255,80,80,.3); color:#ff8080; padding:14px 20px; border-radius:10px; font-size:.9rem; margin-top:16px; max-width:640px; display:none; text-align:left; line-height:1.5; }
  .error-msg.visible { display:block; }

  /* ── SLIDESHOW ── */
  #slideshow { display:none; position:relative; z-index:5; min-height:100vh; flex-direction:column; }
  #slideshow.visible { display:flex; }
  .slides-header { padding:20px 48px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
  .slide-title-bar { font-family:'Syne',sans-serif; font-weight:700; font-size:1rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:400px; }
  .back-btn { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:8px 16px; border-radius:8px; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:.85rem; display:flex; align-items:center; gap:6px; transition:background .2s; }
  .back-btn:hover { background:var(--border); }
  .progress-wrap { display:flex; align-items:center; gap:12px; font-size:.85rem; color:var(--muted); }
  .progress-bar-track { width:140px; height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
  .progress-bar-fill { height:100%; background:var(--accent); border-radius:2px; transition:width .4s ease; }
  .slide-stage { flex:1; display:flex; align-items:center; justify-content:center; padding:48px 24px; }
  .slide-card { background:var(--slide-bg); border:1px solid var(--border); border-radius:20px; width:100%; max-width:860px; min-height:460px; padding:56px 64px; position:relative; overflow:hidden; display:flex; flex-direction:column; justify-content:center; animation:slideIn .35s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateY(16px);} to{opacity:1;transform:translateY(0);} }
  .slide-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--accent),var(--accent2)); }
  .slide-num { font-size:.72rem; letter-spacing:2.5px; text-transform:uppercase; color:var(--accent); font-weight:600; margin-bottom:20px; }
  .slide-heading { font-family:'Syne',sans-serif; font-size:clamp(1.6rem,3.5vw,2.6rem); font-weight:800; line-height:1.15; letter-spacing:-.5px; margin-bottom:28px; }
  .slide-body { font-size:1.08rem; line-height:1.75; color:#ccc; font-weight:300; }
  .slide-body ul { list-style:none; display:flex; flex-direction:column; gap:12px; }
  .slide-body ul li { display:flex; align-items:flex-start; gap:12px; }
  .slide-body ul li::before { content:''; display:block; width:6px; height:6px; background:var(--accent); border-radius:50%; flex-shrink:0; margin-top:10px; }
  .slide-nav { display:flex; align-items:center; justify-content:center; gap:16px; padding:32px 24px 48px; }
  .nav-btn { background:var(--surface2); border:1.5px solid var(--border); color:var(--text); width:52px; height:52px; border-radius:50%; cursor:pointer; font-size:1.2rem; display:flex; align-items:center; justify-content:center; transition:all .2s; }
  .nav-btn:hover:not(:disabled) { background:var(--accent); border-color:var(--accent); transform:scale(1.05); }
  .nav-btn:disabled { opacity:.3; cursor:not-allowed; }
  .slide-dots { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; max-width:300px; }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--border); cursor:pointer; transition:all .2s; }
  .dot.active { background:var(--accent); transform:scale(1.3); }
  .thumb-strip { display:flex; gap:8px; overflow-x:auto; padding:0 48px 32px; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
  .thumb { flex-shrink:0; background:var(--surface); border:1.5px solid var(--border); border-radius:8px; padding:10px 14px; cursor:pointer; font-size:.75rem; color:var(--muted); max-width:140px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition:all .2s; }
  .thumb:hover { border-color:var(--accent); color:var(--text); }
  .thumb.active { border-color:var(--accent); background:rgba(255,107,53,.1); color:var(--accent); }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }
  @media (max-width:600px) {
    header{padding:20px 24px;} .setup-banner{padding:12px 20px; flex-wrap:wrap;}
    .slide-card{padding:36px 28px;} .slides-header{padding:16px 20px;} .thumb-strip{padding:0 20px 24px;}
  }
</style>
</head>
<body>

<header>
  <div class="logo-dot"></div>
  <div class="logo">Slide<span>Sync</span></div>
</header>



<section id="home">
  <p class="eyebrow">YouTube to Slideshow</p>
  <h1>Stop rewinding.<br><em>Start learning.</em></h1>
  <p class="subtitle">Paste any YouTube tutorial link and we'll turn it into a clean, step-by-step slideshow you can follow at your own pace.</p>
  <div class="input-wrap">
    <div class="input-row">
      <input type="text" id="ytUrl" placeholder="https://www.youtube.com/watch?v=..." />
      <button class="go-btn" id="goBtn" onclick="handleGenerate()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        Generate
      </button>
    </div>
    <p class="hint">Works with any YouTube video that has captions or auto-generated subtitles.</p>
  </div>
  <div id="status"><div class="spinner"></div><span id="statusText">Fetching transcript…</span></div>
  <div class="error-msg" id="errorMsg"></div>
</section>

<section id="slideshow">
  <div class="slides-header">
    <button class="back-btn" onclick="goHome()">← Back</button>
    <div class="slide-title-bar" id="deckTitle">Loading…</div>
    <div class="progress-wrap">
      <div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
      <span id="progressLabel">1 / 1</span>
    </div>
  </div>
  <div class="slide-stage"><div class="slide-card" id="slideCard"></div></div>
  <div class="slide-nav">
    <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" disabled>←</button>
    <div class="slide-dots" id="dotRow"></div>
    <button class="nav-btn" id="nextBtn" onclick="navigate(1)">→</button>
  </div>
  <div class="thumb-strip" id="thumbStrip"></div>
</section>

<script>
let slides = [], current = 0;

// ── WORKER URL ──────────────────────────────
const WORKER_URL = "https://slidesync.vercel.app"; // Update this after deploying to Vercel

function getWorkerUrl() {
  return WORKER_URL;
}

// ── VIDEO ID ──────────────────────────────────
function extractVideoId(url) {
  const m = url.match(/(?:v=|\/embed\/|\/shorts\/|youtu\.be\/)([A-Za-z0-9_-]{11})/)
    || url.match(/^([A-Za-z0-9_-]{11})$/);
  return m ? m[1] : null;
}

// ── FETCH TRANSCRIPT via Worker ───────────────
async function fetchTranscript(videoId) {
  const workerUrl = getWorkerUrl();
  if (!workerUrl) throw new Error("No Worker URL configured.");

  let res;
  try {
    res = await fetch(workerUrl + "/api/transcript?videoId=" + videoId);
  } catch (e) {
    throw new Error("Could not reach the Worker. Check it is deployed: " + e.message);
  }

  let body;
  try {
    body = await res.text();
  } catch (e) {
    throw new Error("Worker returned an unreadable response.");
  }

  if (!body || body.trim().length === 0) {
    throw new Error("Worker returned an empty response (HTTP " + res.status + ").");
  }

  let data;
  try {
    data = JSON.parse(body);
  } catch (e) {
    throw new Error("Worker returned invalid JSON. Response was: " + body.slice(0, 120));
  }

  if (data.error) throw new Error(data.error);
  if (!data.transcript) throw new Error("Worker response had no transcript field.");
  return data.transcript;
}

// ── GENERATE SLIDES VIA CLAUDE API ───────────
async function generateSlides(transcript) {
  const sys = `Convert video transcripts into slideshow JSON. Return ONLY a valid JSON array, no markdown fences, no explanation.
Each slide object: {"type":"title"|"overview"|"step"|"tip"|"summary","heading":"max 8 words","body":"string or string[]","stepNumber":N}
Rules: 1 title, 1 overview (3-5 bullets), 5-12 step slides, 1-3 tip slides, 1 summary. Concise and actionable.`;

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: sys,
      messages: [{ role: "user", content: "Transcript:\n\n" + transcript.slice(0, 10000) }]
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  const raw = (data.content.find(b => b.type === "text") || {}).text || "";
  return JSON.parse(raw.replace(/```json|```/g, "").trim());
}

// ── MAIN ──────────────────────────────────────
async function handleGenerate() {
  const url = document.getElementById("ytUrl").value.trim();
  if (!url) return;
  const videoId = extractVideoId(url);
  if (!videoId) return showError("That doesn't look like a valid YouTube URL.");

  setStatus("Fetching transcript…");
  setError("");
  document.getElementById("goBtn").disabled = true;

  try {
    const transcript = await fetchTranscript(videoId);
    setStatus("Generating slides with AI…");
    slides = await generateSlides(transcript);
    current = 0;
    renderSlideshow();
    showSlideshow();
  } catch (err) {
    showError(err.message || "Something went wrong. Please try again.");
  } finally {
    setStatus("");
    document.getElementById("goBtn").disabled = false;
  }
}

// ── RENDER ────────────────────────────────────
function renderSlideshow() {
  document.getElementById("deckTitle").textContent = (slides[0] || {}).heading || "Slideshow";
  document.getElementById("thumbStrip").innerHTML = slides.map((s,i) =>
    '<div class="thumb '+(i===0?'active':'')+'" onclick="goTo('+i+')" id="thumb'+i+'">'+s.heading+'</div>').join('');
  document.getElementById("dotRow").innerHTML = slides.map((_,i) =>
    '<div class="dot '+(i===0?'active':'')+'" onclick="goTo('+i+')" id="dot'+i+'"></div>').join('');
  renderSlide();
}

function renderSlide() {
  const s = slides[current];
  if (!s) return;
  document.getElementById("progressFill").style.width = ((current+1)/slides.length*100).toFixed(1)+"%";
  document.getElementById("progressLabel").textContent = (current+1)+" / "+slides.length;
  document.getElementById("prevBtn").disabled = current === 0;
  document.getElementById("nextBtn").disabled = current === slides.length-1;
  document.querySelectorAll(".dot").forEach((d,i) => d.classList.toggle("active", i===current));
  document.querySelectorAll(".thumb").forEach((t,i) => t.classList.toggle("active", i===current));
  var th = document.getElementById("thumb"+current);
  if (th) th.scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"});
  var labels = {title:"INTRO",overview:"OVERVIEW",step:"STEP "+(s.stepNumber||""),tip:"TIP",summary:"SUMMARY"};
  var bodyHtml = Array.isArray(s.body)
    ? '<div class="slide-body"><ul>'+s.body.map(function(b){return '<li><span>'+b+'</span></li>';}).join('')+'</ul></div>'
    : '<div class="slide-body"><p>'+s.body+'</p></div>';
  document.getElementById("slideCard").innerHTML =
    '<div class="slide-num">'+(labels[s.type]||s.type.toUpperCase())+'</div>'+
    '<div class="slide-heading">'+s.heading+'</div>'+bodyHtml;
  var card = document.getElementById("slideCard");
  card.style.animation="none"; card.offsetHeight; card.style.animation="";
}

function navigate(dir) { var n=current+dir; if(n>=0&&n<slides.length){current=n;renderSlide();} }
function goTo(i) { current=i; renderSlide(); }
function showSlideshow() { document.getElementById("home").style.display="none"; document.getElementById("slideshow").classList.add("visible"); }
function goHome() { document.getElementById("slideshow").classList.remove("visible"); document.getElementById("home").style.display="flex"; }
function setStatus(msg) { document.getElementById("status").classList.toggle("visible",!!msg); document.getElementById("statusText").textContent=msg; }
function setError(msg) { var el=document.getElementById("errorMsg"); el.textContent=msg; el.classList.toggle("visible",!!msg); }
function showError(msg) { setError(msg); }

document.addEventListener("keydown", function(e) {
  if (!document.getElementById("slideshow").classList.contains("visible")) return;
  if (e.key==="ArrowRight"||e.key==="ArrowDown") navigate(1);
  if (e.key==="ArrowLeft"||e.key==="ArrowUp") navigate(-1);
});
</script>
</body>
</html>
